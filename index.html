<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amateur-Code-Kommentator EN/DE</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #e0f7fa;
      margin: 0;
      padding: 20px;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00796b;
    }

    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 800px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      border: 2px solid #b2dfdb;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      resize: both;
      min-width: 200px;
      max-width: 100%;
      min-height: 100px;
      max-height: 500px;
      background: #f0f0f0;
      box-sizing: border-box;
    }

    textarea:focus {
      border-color: #0288d1;
      box-shadow: 0 0 8px rgba(2, 136, 209, 0.4);
      outline: none;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      color: white;
    }

    #commentBtn { background: #26a69a; }
    #commentBtn:hover { background: #00796b; }

    #translateBtn { background: #0288d1; }
    #translateBtn:hover { background: #01579b; }

    #resetBtn { background: #ef5350; }
    #resetBtn:hover { background: #c62828; }

    #output {
      white-space: pre-wrap;
      font-family: monospace;
      background: #e0f2f1;
      padding: 15px;
      border-radius: 10px;
      min-height: 150px;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>

  <h1>Amateur-Code-Kommentator EN/DE</h1>

  <div class="card">
    <textarea id="codeInput" placeholder="Füge hier deinen Code ein..."></textarea>
    <div class="buttons">
      <button id="commentBtn">Kommentieren</button>
      <button id="translateBtn">Deutsch ↔ Englisch</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="card" id="output"></div>

  <script>
    const codeInput = document.getElementById("codeInput");
    const output = document.getElementById("output");
    const commentBtn = document.getElementById("commentBtn");
    const resetBtn = document.getElementById("resetBtn");
    const translateBtn = document.getElementById("translateBtn");

    let isGerman = true;

    const commentsDE = {
      variable: ["/* Variable erstellen */", "/* Speicherplatz für Daten */", "/* Box für Werte */"],
      loop: ["/* Macht etwas immer wieder */", "/* Wiederholt Code */", "/* Schleife startet und endet */"],
      action: ["/* Macht etwas */", "/* Aktion ausführen */", "/* Schritt im Code */"]
    };

    const commentsEN = {
      variable: ["/* Create variable */", "/* Storage for data */", "/* Box for values */"],
      loop: ["/* Does something repeatedly */", "/* Repeats code */", "/* Loop starts and ends */"],
      action: ["/* Does something */", "/* Execute action */", "/* Step in code */"]
    };

    const pickRandom = arr => arr[Math.floor(Math.random() * arr.length)];

    const generateComments = code => {
      const lines = code.split("\n");
      const dict = isGerman ? commentsDE : commentsEN;
      return lines.map(line => {
        const trimmed = line.trim();
        let comment = "";
        if (/^(let|const|var)/.test(trimmed)) comment = pickRandom(dict.variable);
        else if (/^(for|while)/.test(trimmed)) comment = pickRandom(dict.loop);
        else if (/^function/.test(trimmed)) comment = pickRandom(dict.action);
        else if (trimmed.length > 0) comment = pickRandom(dict.action);
        return comment ? `${comment}\n${line}` : line;
      }).join("\n");
    };

    commentBtn.addEventListener("click", () => {
      if (!codeInput.value.trim()) return alert(isGerman ? "Bitte Code eingeben!" : "Please enter code!");
      output.textContent = generateComments(codeInput.value);
    });

    resetBtn.addEventListener("click", () => {
      codeInput.value = "";
      output.textContent = "";
    });

    translateBtn.addEventListener("click", () => {
      isGerman = !isGerman;
      output.textContent = generateComments(codeInput.value);
    });
  </script>

</body>
</html>
